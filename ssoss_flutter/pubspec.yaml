name: ssoss_flutter
description: "쏘쓰 서비스 플러터 모바일 어플리케이션"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: ^9.0.0
  dio: ^5.9.0
  provider: ^6.1.5
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  flutter_svg: ^2.0.17
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  flutter_lints: ^6.0.0
  flutter_dotenv: ^6.0.1
  flutter_naver_login: ^2.1.1
  flutter_secure_storage: ^10.3.1
  sign_in_with_apple: ^8.1.0
  appflowy_editor: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - env/.env.dev
    - env/.env.staging
    - env/.env.prod
    - assets/icons/brand/
    - assets/icons/common/
    - assets/icons/navigation/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Thin.ttf
          weight: 100
        - asset: assets/fonts/Pretendard-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Pretendard-Light.ttf
          weight: 300
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.ttf
          weight: 900

flutter_launcher_icons:
  # android: true # 안드로이드 플랫폼에 런처 아이콘 적용 여부
  # image_path: "assets/icons/app_icon.png" # 런처 아이콘으로 사용할 이미지 경로
  # adaptive_icon_background: "#ffffff" # 안드로이드 적응형 아이콘의 배경색 (검정색)
  # adaptive_icon_foreground: "assets/icons/app-icon.png" # 안드로이드 적응형 아이콘의 전경 이미지 경로
  # adaptive_icon_foreground_inset: 24
  ios: true # iOS 플랫폼에 런처 아이콘 적용 여부
  image_path: "assets/icons/ios_icon.png" # 런처 아이콘으로 사용할 이미지 경로
  remove_alpha_ios: true