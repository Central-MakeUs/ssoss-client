name: ssoss_flutter
description: "쏘쓰 서비스 플러터 모바일 어플리케이션"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: ^10.1.0
  dio: ^5.9.0
  provider: ^6.1.5
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  flutter_svg: ^2.0.17
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  flutter_lints: ^6.0.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.15.0
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  assets:
    - env/.env.dev
    - env/.env.staging
    - env/.env.prod
    - assets/icons/brand/
    - assets/icons/common/
    - assets/icons/navigation/
